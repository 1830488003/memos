<!-- MemOS 设置面板 - 酒馆扩展菜单格式 -->
<div class="extension_settings" data-extension-name="memos">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>
                <i class="fa-solid fa-brain"></i>
                MemOS 记忆集成
            </b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>

        <div class="inline-drawer-content">
            <!-- 版本与更新信息 -->
            <div class="memos-version-panel">
                <p>作者: 萧然</p>
                <p>
                    当前版本:
                    <span id="memos-current-version">0.0.0</span>
                    <span class="update-indicator" style="display: none; color: #f59e0b;">(发现新版!)</span>
                </p>
                <button id="memos-check-update" class="menu_button">
                    <i class="fa-solid fa-cloud-arrow-down"></i> 检查更新
                </button>
            </div>
            <div class="description_text" style="text-align: center; margin-top: 5px;">
                有问题请联系作者 QQ群: 118774271
            </div>
            <hr />

            <!-- API配置 -->
            <div class="setting_item">
                <label for="memos-api-endpoint">API 端点:</label>
                <input type="text" id="memos-api-endpoint" class="text_pole" value="https://memos.memtensor.cn/api/openmem/v1">
            </div>
            
            <div class="setting_item">
                <label for="memos-api-key">API 密钥:</label>
                <input type="password" id="memos-api-key" class="text_pole" placeholder="输入你的 MemOS API Key (mpg-xxx)">
                <small>从 MemOS Cloud 控制台获取</small>
            </div>
            
            <div class="setting_item flex-container">
                <button id="memos-test-connection" class="menu_button">
                    🔌 测试连接
                </button>
                <button id="memos-save-config" class="menu_button">
                    💾 保存配置
                </button>
                <button id="memos-clear-config" class="menu_button">
                    🗑️ 清除配置
                </button>
            </div>
            
            <div id="memos-api-status" class="memos-status-box">
                状态: 未配置
            </div>

            <hr />

            <!-- 功能开关 -->
            <div class="setting_item flex-container">
                <label for="memos-enabled">启用插件</label>
                <div class="SillyTavernSwitch">
                    <input id="memos-enabled" type="checkbox" checked>
                    <div class="SillyTavernSlider"></div>
                </div>
            </div>

            <div class="setting_item flex-container">
                <label for="memos-auto-save">自动保存对话</label>
                <div class="SillyTavernSwitch">
                    <input id="memos-auto-save" type="checkbox" checked>
                    <div class="SillyTavernSlider"></div>
                </div>
            </div>

            <div class="setting_item flex-container">
                <label for="memos-auto-retrieve">自动检索记忆</label>
                <div class="SillyTavernSwitch">
                    <input id="memos-auto-retrieve" type="checkbox" checked>
                    <div class="SillyTavernSlider"></div>
                </div>
            </div>

            <div class="setting_item">
                <label for="memos-retrieve-count">检索数量:</label>
                <input type="number" id="memos-retrieve-count" class="text_pole" value="5" min="1" max="10">
            </div>

            <div class="setting_item">
                <label for="memos-relativity-threshold">相关度阈值:</label>
                <input type="number" id="memos-relativity-threshold" class="text_pole" value="0.5" min="0" max="1" step="0.1">
            </div>

            <hr />

            <!-- 手动操作 -->
            <div class="setting_item">
                <label for="memos-manual-content">手动保存内容:</label>
                <textarea id="memos-manual-content" class="text_pole" rows="3" placeholder="输入要保存到 MemOS 的内容..."></textarea>
            </div>

            <div class="setting_item">
                <button id="memos-manual-save" class="menu_button">
                    📤 保存到 MemOS
                </button>
            </div>

            <hr />

            <div class="setting_item">
                <label for="memos-search-query">搜索记忆:</label>
                <input type="text" id="memos-search-query" class="text_pole" placeholder="输入关键词搜索...">
            </div>

            <div class="setting_item flex-container">
                <button id="memos-search" class="menu_button">
                    🔍 搜索
                </button>
                <button id="memos-get-all" class="menu_button">
                    📋 显示所有
                </button>
            </div>

            <hr />

            <!-- 记忆注入预览 -->
            <div class="setting_item">
                <label>记忆注入预览:</label>
                <textarea id="memos-injection-preview" class="text_pole" rows="6" readonly placeholder="检索到的记忆将显示在这里..."></textarea>
            </div>

            <div class="setting_item flex-container">
                <button id="memos-refresh-injection" class="menu_button">
                    🔄 刷新注入
                </button>
                <button id="memos-clear-injection" class="menu_button">
                    🗑️ 清空注入
                </button>
            </div>

            <hr />

            <!-- 统计信息 -->
            <div class="setting_item">
                <label>统计信息:</label>
                <div class="memos-stats-grid">
                    <div class="memos-stat-box">
                        <div class="memos-stat-value" id="memos-total-memories">0</div>
                        <div class="memos-stat-label">记忆总数</div>
                    </div>
                    <div class="memos-stat-box">
                        <div class="memos-stat-value" id="memos-sessions-saved">0</div>
                        <div class="memos-stat-label">已保存消息</div>
                    </div>
                    <div class="memos-stat-box">
                        <div class="memos-stat-value" id="memos-retrieves-count">0</div>
                        <div class="memos-stat-label">检索次数</div>
                    </div>
                    <div class="memos-stat-box">
                        <div class="memos-stat-value" id="memos-last-retrieve">从未</div>
                        <div class="memos-stat-label">最后检索</div>
                    </div>
                </div>
            </div>

            <div class="setting_item">
                <label>最后保存时间:</label>
                <div id="memos-last-save" style="color: #888;">从未</div>
            </div>
        </div>
    </div>
</div>
